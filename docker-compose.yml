version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: ae_challenge_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: challenge
    ports:
      - "5432:5432"
  sftp:
    image: atmoz/sftp
    ports:
      - "2222:22"
    command: user:password:::upload