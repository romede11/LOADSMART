version: 2

models:
  - name: stg_freight_loads
    description: >
      Staging model for freight loads data. Deduplicates records by loadsmart_id using
      the most recent available timestamp across multiple date fields. Standardizes data types
      and generates a surrogate hash key (check_col_key) to detect changes for incremental loading.

    columns:

      - name: loadsmart_id
        description: Unique identifier for each freight load.
        tests:
          - not_null
          - unique

      - name: lane
        description: Route of the freight load represented as "origin_city,state -> destination_city,state".

      - name: quote_date
        description: Timestamp when the load was quoted.

      - name: book_date
        description: Timestamp when the load was booked.

      - name: source_date
        description: Timestamp when the load was sourced (nullable).

      - name: pickup_date
        description: Scheduled pickup timestamp.

      - name: delivery_date
        description: Scheduled delivery timestamp.

      - name: book_price
        description: Final booked price charged to the customer.

      - name: source_price
        description: Cost paid to the carrier for the load.

      - name: pnl
        description: Profit and loss for the load, calculated as book_price minus source_price.

      - name: mileage
        description: Distance of the freight lane in miles.

      - name: equipment_type
        description: Type of equipment used (e.g., DRV = Dry Van, RFR = Reefer).

      - name: carrier_rating
        description: Numeric rating score of the carrier (scale to be confirmed).

      - name: sourcing_channel
        description: Channel through which the load was sourced (may be sparsely populated).

      - name: vip_carrier
        description: Boolean flag indicating whether the carrier is classified as VIP (business-defined).

      - name: carrier_dropped_us_count
        description: Number of times the carrier has dropped loads assigned by the company.

      - name: carrier_name
        description: Name of the carrier.

      - name: shipper_name
        description: Name of the shipper.

      - name: carrier_on_time_to_pickup
        description: Boolean flag indicating whether the carrier arrived on time for pickup.

      - name: carrier_on_time_to_delivery
        description: Boolean flag indicating whether the carrier delivered on time.

      - name: carrier_on_time_overall
        description: Boolean flag indicating overall on-time performance for the load.

      - name: pickup_appointment_time
        description: Scheduled pickup appointment timestamp (cast from string format).

      - name: delivery_appointment_time
        description: Scheduled delivery appointment timestamp (cast from string format).

      - name: has_mobile_app_tracking
        description: Boolean flag indicating if mobile app tracking was enabled.

      - name: has_macropoint_tracking
        description: Boolean flag indicating if Macropoint tracking was enabled.

      - name: has_edi_tracking
        description: Boolean flag indicating if EDI tracking was enabled.

      - name: contracted_load
        description: Boolean flag indicating whether the load was part of a contracted agreement (vs spot market).

      - name: load_booked_autonomously
        description: Boolean flag indicating whether the load was booked automatically by the system.

      - name: load_sourced_autonomously
        description: Boolean flag indicating whether the load was sourced automatically by the system.

      - name: load_was_cancelled
        description: Boolean flag indicating whether the load was cancelled.

      - name: check_col_key
        description: Surrogate hash key generated from business columns to detect changes.
        tests:
          - not_null

      - name: dbt_created_at
        description: Date when the record was first created in the model.
        tests:
          - not_null

      - name: dbt_updated_at
        description: Date when the record was last updated due to detected changes.